    <style><![CDATA[
.evolutionEdge {
	stroke-dasharray: 7;
	stroke-dashoffset: 7;
	animation: dash 3s linear forwards infinite;
}


.visibility0 {
	opacity: 0.8;
}



.invisibility0 {
	opacity: NaN;
}


@keyframes dash {
	from {
		stroke-dashoffset: 100;
	}
	to {
		stroke-dashoffset: 0;
	}
}
.componentText {
  background: transparent;
  color: #fff;
  resize: none;
  border: 0 none;
  width: 100%;
  font-size: 0.8em;
  outline: none;
  height: 100%;
  position: absolute;
}

]]></style>
    <script id="SVGScript">var g = new Map();
var allLinks = new Array(); 

allLinks.push('edge_0_1','edge_1_2','edge_2_5','edge_2_3','edge_2_4',);

g.set('element_0',Array('edge_0_1','edge_1_2','edge_2_3','edge_2_4','edge_2_5',));
g.set('element_1',Array('edge_1_2','edge_2_3','edge_2_4','edge_2_5',));
g.set('element_2',Array('edge_2_3','edge_2_4','edge_2_5',));

const max = 9
function toggleLink(clicked_id)
{
	if (g.has(clicked_id)) {
		g.get(clicked_id).forEach(element => {
			var style = document.getElementById(element).style.display;
			if(style === "none")
				document.getElementById(element).style.display = "block";
			else
				document.getElementById(element).style.display = "none";

		});
	}
}
function toggleLinks() {
	allLinks.forEach(element => {
		var style = document.getElementById(element).style.display;
		if(style === "none") {
			document.getElementById(element).style.display = "block";
		} else {
			document.getElementById(element).style.display = "none";
		}
	});
}

var allVisibilities = new Map();
var allInVisibilities = new Map();
function setVisibility() {
	
	allVisibilities.set('invisibility0',document.querySelectorAll('.visibility0'))
	allInVisibilities.set('visibility0',document.querySelectorAll('.invisibility0'))
}

var visible = true

function toggleVisibility() {
	components = allVisibilities
	if (visible) {
		components = allInVisibilities
		visible = false
	} else {
		visible = true
	}
	components.forEach(function(value, key) {
		if (value.length === 0) {
			setVisibility();
		}
		value.forEach(element => {
			element.classList.toggle(key)	
		});
	})
}


setVisibility();
</script>
